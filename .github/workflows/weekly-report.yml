name: Weekly Competitor Intelligence Report

on:
  schedule:
    # Every Monday at 09:00 UTC (about 03:00 CST / 04:00 EDT)
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch competitor sitemaps
        run: npm run fetch:sitemaps

      - name: Diff sitemaps vs previous week
        run: npm run diff:sitemaps

      - name: Process uploaded SEMrush CSVs
        run: npm run process:csvs

      - name: Generate report with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run report:generate

      - name: Commit report and snapshots back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly competitor report: $(date -u +%Y-%m-%d)"
            git push
          fi
